<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Thư viện VTS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">🔑</div>
            <h1>Đăng nhập</h1>
            <p>Đăng nhập để sử dụng hệ thống</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login">Email hoặc Số điện thoại</label>
                <input type="text" id="login" name="login" 
                       placeholder="Nhập email hoặc số điện thoại" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" 
                       placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">
                Đăng nhập
            </button>
        </form>

        <div class="footer-links">
            <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            <p style="margin-top: 8px;"><a href="../index.html">← Quay lại trang chủ</a></p>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script>
        /**
         * Xử lý đăng nhập
         * Gọi API POST /api/users/login → nhận user (kèm role)
         * 
         * Phân luồng:
         *   - role === 'admin'   → chuyển đến admin-scan.html
         *   - role === 'student' → chuyển đến dashboard.html
         */
        async function handleLogin(event) {
            event.preventDefault();

            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('alert');

            alert.classList.remove('show', 'alert-success', 'alert-error');

            if (!login || !password) {
                alert.textContent = 'Vui lòng nhập email (hoặc số điện thoại) và mật khẩu';
                alert.className = 'alert alert-error show';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';

            try {
                const result = await apiPost('/users/login', { login, password });
                const user = result.data.user;
                
                // Debug log
                console.log('[Login Frontend] User:', user.full_name, '| Role:', user.role);

                // Lưu thông tin user vào localStorage
                localStorage.setItem('currentUser', JSON.stringify(user));

                // Thông báo thành công
                alert.innerHTML = `
                    <strong>✅ Đăng nhập thành công!</strong><br>
                    Xin chào, <strong>${user.full_name}</strong>.<br>
                    <span style="font-size: 13px;">Đang chuyển hướng...</span>
                `;
                alert.className = 'alert alert-success show';

                // Phân luồng dựa trên role
                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = 'admin-scan.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);

            } catch (err) {
                alert.textContent = err.message || 'Đăng nhập thất bại. Vui lòng thử lại.';
                alert.className = 'alert alert-error show';
                btn.disabled = false;
                btn.textContent = 'Đăng nhập';
            }
        }

        // Nếu đã đăng nhập thì tự động chuyển hướng
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                const user = JSON.parse(userData);
                if (user.role === 'admin') {
                    window.location.href = 'admin-scan.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
