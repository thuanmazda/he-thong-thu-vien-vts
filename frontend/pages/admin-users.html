<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý thành viên - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-page {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: #f8f9fc;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .hdr {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 20px 24px;
        }

        .hdr .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hdr .top-row .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .hdr .top-row .hdr-title {
            font-size: 16px;
            font-weight: 600;
        }

        .hdr .top-row .hdr-action {
            width: 36px;
        }

        .hdr .stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .hdr .stat-item {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
        }

        .hdr .stat-item .num {
            font-size: 20px;
            font-weight: 700;
        }

        .hdr .stat-item .lbl {
            font-size: 11px;
            opacity: 0.9;
        }

        /* Search */
        .search-bar {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #f3f4f6;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .search-bar input:focus {
            border-color: #667eea;
        }

        /* List */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
        }

        .group-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin: 12px 0 8px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .group-header .count {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            margin-left: 8px;
        }

        .user-card {
            background: white;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .user-card .name {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .user-card .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .user-card .info-row .label {
            color: #9ca3af;
        }

        .user-card .info-row .value {
            font-weight: 600;
            color: #1a1a2e;
        }

        .user-card .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .user-card .badge.student {
            background: #dbeafe;
            color: #1e40af;
        }

        .user-card .badge.admin {
            background: #fef3c7;
            color: #92400e;
        }

        /* Loading & Error */
        .list-container .loading-box,
        .list-container .error-box {
            text-align: center;
            padding: 60px 20px;
        }

        .list-container .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .list-container .error-box .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .list-container .error-box p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #f3f4f6;
            background: white;
            padding: 8px 0;
            position: sticky;
            bottom: 0;
        }

        .bottom-nav a {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            text-decoration: none;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 500;
        }

        .bottom-nav a.active {
            color: #667eea;
        }

        .bottom-nav a .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }

        @media (min-width: 421px) {
            .admin-page {
                border-radius: 24px;
                min-height: auto;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-page">
        <!-- Header -->
        <div class="hdr">
            <div class="top-row">
                <a href="admin-scan.html" class="back-btn">←</a>
                <span class="hdr-title">👥 Quản lý thành viên</span>
                <div class="hdr-action"></div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="num" id="totalUsers">0</div>
                    <div class="lbl">Tổng thành viên</div>
                </div>
                <div class="stat-item">
                    <div class="num" id="totalStudents">0</div>
                    <div class="lbl">Sinh viên</div>
                </div>
                <div class="stat-item">
                    <div class="num" id="totalAdmins">0</div>
                    <div class="lbl">Admin</div>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Tìm theo tên, email, mã thẻ..." oninput="filterUsers()">
        </div>

        <!-- Danh sách -->
        <div class="list-container" id="listContainer">
            <div id="loadingState" class="loading-box">
                <div class="spinner"></div>
                <p>Đang tải danh sách...</p>
            </div>

            <div id="errorState" class="error-box" style="display: none;">
                <div class="icon">⚠️</div>
                <p id="errorMessage">Không thể tải dữ liệu</p>
                <button onclick="location.reload()" class="btn btn-primary" style="width: auto; padding: 10px 28px; display: inline-block;">
                    🔄 Thử lại
                </button>
            </div>

            <div id="usersList"></div>
        </div>

        <!-- Bottom nav -->
        <div class="bottom-nav">
            <a href="admin-scan.html">
                <span class="icon">📷</span>
                Quét mã
            </a>
            <a href="admin-users.html" class="active">
                <span class="icon">👥</span>
                Thành viên
            </a>
            <a href="admin-stats.html">
                <span class="icon">📊</span>
                Thống kê
            </a>
            <a href="history.html">
                <span class="icon">📋</span>
                Lịch sử
            </a>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script>
        // ===== KIỂM TRA QUYỀN ADMIN =====
        (function() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                alert('Bạn không có quyền truy cập!');
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userData);
            if (user.role !== 'admin') {
                alert('Bạn không có quyền truy cập trang này!');
                window.location.href = 'dashboard.html';
                return;
            }
        })();

        let allUsers = [];

        /**
         * Gom nhóm users theo class_name
         */
        function groupByClass(users) {
            const groups = {};
            users.forEach(user => {
                const key = user.class_name || 'Chưa cập nhật';
                if (!groups[key]) groups[key] = [];
                groups[key].push(user);
            });
            return groups;
        }

        /**
         * Render danh sách users
         */
        function renderUsers(users) {
            const container = document.getElementById('usersList');
            const groups = groupByClass(users);

            // Sắp xếp: "Cựu" lên đầu, còn lại theo alphabet
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                if (a === 'Cựu') return -1;
                if (b === 'Cựu') return 1;
                return a.localeCompare(b);
            });

            if (sortedKeys.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #9ca3af;">Không có thành viên nào</div>';
                return;
            }

            container.innerHTML = sortedKeys.map(className => {
                const usersInGroup = groups[className];
                return `
                    <div class="group-header">
                        📚 ${className} <span class="count">${usersInGroup.length}</span>
                    </div>
                    ${usersInGroup.map(user => `
                        <div class="user-card">
                            <div class="name">${user.full_name}</div>
                            <div class="info-row">
                                <span class="label">Mã thẻ:</span>
                                <span class="value">${user.library_code}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Niên khóa:</span>
                                <span class="value">${user.school_year || '---'}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Email:</span>
                                <span class="value">${user.email}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">SĐT:</span>
                                <span class="value">${user.phone_number}</span>
                            </div>
                            <span class="badge ${user.role}">${user.role === 'admin' ? '👑 Admin' : '👤 Student'}</span>
                        </div>
                    `).join('')}
                `;
            }).join('');
        }

        /**
         * Tải danh sách users từ API
         */
        async function loadUsers() {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const errorMessage = document.getElementById('errorMessage');
            const usersList = document.getElementById('usersList');

            // Lấy user_id từ localStorage
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            const currentUser = JSON.parse(userData);

            try {
                const result = await apiGet('/admin/users', { user_id: currentUser.id });
                allUsers = result.data || [];

                // Cập nhật stats
                const total = allUsers.length;
                const students = allUsers.filter(u => u.role === 'student').length;
                const admins = allUsers.filter(u => u.role === 'admin').length;

                document.getElementById('totalUsers').textContent = total;
                document.getElementById('totalStudents').textContent = students;
                document.getElementById('totalAdmins').textContent = admins;

                // Render
                loadingState.style.display = 'none';
                errorState.style.display = 'none';
                renderUsers(allUsers);

            } catch (err) {
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                errorMessage.textContent = err.message || 'Không thể tải danh sách thành viên';
                usersList.innerHTML = '';
            }
        }

        /**
         * Lọc users theo search
         */
        function filterUsers() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderUsers(allUsers);
                return;
            }
            const filtered = allUsers.filter(user => 
                user.full_name.toLowerCase().includes(keyword) ||
                user.email.toLowerCase().includes(keyword) ||
                user.library_code.toLowerCase().includes(keyword) ||
                (user.phone_number && user.phone_number.includes(keyword))
            );
            renderUsers(filtered);
        }

        // Load khi trang sẵn sàng
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
