<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Thư viện VTS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="logo">📝</div>
            <h1>Đăng ký tài khoản</h1>
            <p>Đăng ký để nhận mã QR thẻ thư viện</p>
        </div>

        <!-- Alert thông báo -->
        <div id="alert" class="alert"></div>

        <!-- Form Đăng ký -->
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="full_name">Họ và tên</label>
                <input type="text" id="full_name" name="full_name" 
                       placeholder="Nhập họ và tên" required autofocus>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" 
                       placeholder="Nhập email" required>
            </div>

            <div class="form-group">
                <label for="phone_number">Số điện thoại</label>
                <input type="tel" id="phone_number" name="phone_number" 
                       placeholder="Nhập số điện thoại" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu (ít nhất 6 ký tự)</label>
                <input type="password" id="password" name="password" 
                       placeholder="Nhập mật khẩu" required minlength="6">
            </div>

            <!-- Niên khóa -->
            <div class="form-group">
                <label>Niên khóa</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <select id="year_start" required style="flex: 1;">
                        <option value="">Năm bắt đầu</option>
                    </select>
                    <span style="font-weight: 600; color: #6b7280;">-</span>
                    <select id="year_end" required style="flex: 1;">
                        <option value="">Năm kết thúc</option>
                    </select>
                </div>
                <div id="schoolYearPreview" style="font-size: 13px; color: #667eea; font-weight: 600; margin-top: 4px;">
                    Niên khóa: <span id="schoolYearValue">---</span>
                </div>
            </div>

            <!-- Lớp -->
            <div class="form-group">
                <label for="class_name">Lớp</label>
                <input type="text" id="class_name" name="class_name" 
                       placeholder="VD: ĐT21, Cơ điện tử, ...">
                <div style="font-size: 12px; color: #9ca3af; margin-top: 4px;">
                    💡 Nếu đã tốt nghiệp/ra trường, vui lòng nhập là <strong>Cựu</strong>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="registerBtn">
                Đăng ký
            </button>
        </form>

        <!-- Chuyển hướng đăng nhập -->
        <div class="footer-links">
            <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
            <p style="margin-top: 8px;"><a href="../index.html">← Quay lại trang chủ</a></p>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script>
        // --- Tạo danh sách năm cho dropdown ---
        const currentYear = new Date().getFullYear();
        const yearStartSelect = document.getElementById('year_start');
        const yearEndSelect = document.getElementById('year_end');
        const schoolYearValue = document.getElementById('schoolYearValue');

        // Năm bắt đầu: từ 2015 đến năm hiện tại + 1
        for (let y = currentYear + 1; y >= 2015; y--) {
            const opt1 = document.createElement('option');
            opt1.value = y;
            opt1.textContent = y;
            yearStartSelect.appendChild(opt1);

            const opt2 = document.createElement('option');
            opt2.value = y;
            opt2.textContent = y;
            yearEndSelect.appendChild(opt2);
        }

        // Mặc định chọn năm bắt đầu = năm hiện tại, năm kết thúc = năm hiện tại + 4
        yearStartSelect.value = currentYear;
        yearEndSelect.value = currentYear + 4;
        updateSchoolYear();

        // Cập nhật preview niên khóa khi thay đổi
        yearStartSelect.addEventListener('change', updateSchoolYear);
        yearEndSelect.addEventListener('change', updateSchoolYear);

        function updateSchoolYear() {
            const start = yearStartSelect.value;
            const end = yearEndSelect.value;
            if (start && end) {
                schoolYearValue.textContent = `${start}-${end}`;
            } else {
                schoolYearValue.textContent = '---';
            }
        }

        /**
         * Xử lý đăng ký tài khoản
         * Gọi API POST /api/users/register
         * Thành công → thông báo + chuyển sang trang Đăng nhập
         */
        async function handleRegister(event) {
            event.preventDefault();

            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone_number = document.getElementById('phone_number').value.trim();
            const password = document.getElementById('password').value;
            const school_year = `${yearStartSelect.value}-${yearEndSelect.value}`;
            const class_name = document.getElementById('class_name').value.trim();
            const btn = document.getElementById('registerBtn');
            const alert = document.getElementById('alert');

            alert.classList.remove('show', 'alert-success', 'alert-error');

            if (!full_name || !email || !phone_number || !password) {
                alert.textContent = 'Vui lòng nhập đầy đủ thông tin';
                alert.className = 'alert alert-error show';
                return;
            }

            if (password.length < 6) {
                alert.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                alert.className = 'alert alert-error show';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';

            try {
                const result = await apiPost('/users/register', {
                    full_name,
                    email,
                    phone_number,
                    password,
                    school_year,
                    class_name: class_name || null
                });

                alert.innerHTML = `
                    <strong>✅ Đăng ký thành công!</strong><br>
                    Mã thẻ thư viện của bạn: 
                    <strong style="color: #667eea; font-size: 18px;">${result.data.library_code}</strong><br>
                    <span style="font-size: 13px;">Bạn sẽ được chuyển đến trang đăng nhập...</span>
                `;
                alert.className = 'alert alert-success show';

                document.getElementById('registerForm').reset();
                // Reset preview
                yearStartSelect.value = currentYear;
                yearEndSelect.value = currentYear + 4;
                updateSchoolYear();

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2500);

            } catch (err) {
                alert.textContent = err.message || 'Đăng ký thất bại. Vui lòng thử lại.';
                alert.className = 'alert alert-error show';
                btn.disabled = false;
                btn.textContent = 'Đăng ký';
            }
        }
    </script>
</body>
</html>
