<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thống kê - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-page {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: #f8f9fc;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .hdr {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 20px 24px;
        }

        .hdr .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hdr .top-row .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .hdr .top-row .hdr-title {
            font-size: 16px;
            font-weight: 600;
        }

        .hdr .top-row .hdr-action {
            width: 36px;
        }

        .hdr .date-display {
            font-size: 13px;
            opacity: 0.9;
            text-align: center;
        }

        /* Stats Grid */
        .stats-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
        }

        .stat-card.full-width {
            grid-column: 1 / -1;
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
            font-weight: 500;
        }

        .stat-card .sub {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        /* Color variants */
        .stat-card.blue { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .stat-card.blue .value { color: white; }
        .stat-card.blue .label { color: rgba(255,255,255,0.9); }
        .stat-card.blue .sub { color: rgba(255,255,255,0.7); }

        .stat-card.green { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .stat-card.green .value { color: white; }
        .stat-card.green .label { color: rgba(255,255,255,0.9); }
        .stat-card.green .sub { color: rgba(255,255,255,0.7); }

        .stat-card.orange { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .stat-card.orange .value { color: white; }
        .stat-card.orange .label { color: rgba(255,255,255,0.9); }
        .stat-card.orange .sub { color: rgba(255,255,255,0.7); }

        .stat-card.purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
        .stat-card.purple .value { color: white; }
        .stat-card.purple .label { color: rgba(255,255,255,0.9); }
        .stat-card.purple .sub { color: rgba(255,255,255,0.7); }

        /* Currently Inside List */
        .section {
            padding: 0 16px 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .inside-list {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .inside-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inside-item:last-child {
            border-bottom: none;
        }

        .inside-item .info {
            flex: 1;
        }

        .inside-item .name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .inside-item .meta {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }

        .inside-item .time {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #9ca3af;
            font-size: 14px;
        }

        /* Longest session */
        .longest-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .longest-card .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .longest-card .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .longest-card .user-details .name {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .longest-card .user-details .class {
            font-size: 13px;
            color: #6b7280;
        }

        .longest-card .duration {
            text-align: center;
            padding: 12px;
            background: #f9fafb;
            border-radius: 10px;
        }

        .longest-card .duration .time {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
        }

        .longest-card .duration .label {
            font-size: 12px;
            color: #6b7280;
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #f3f4f6;
            background: white;
            padding: 8px 0;
            position: sticky;
            bottom: 0;
        }

        .bottom-nav a {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            text-decoration: none;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 500;
        }

        .bottom-nav a.active {
            color: #667eea;
        }

        .bottom-nav a .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }

        @media (min-width: 421px) {
            .admin-page {
                border-radius: 24px;
                min-height: auto;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                margin: 20px;
            }
        }

        /* Loading */
        .loading-box {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-box .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            text-align: center;
            padding: 60px 20px;
        }

        .error-box .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .error-box p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="admin-page">
        <!-- Header -->
        <div class="hdr">
            <div class="top-row">
                <a href="admin-scan.html" class="back-btn">←</a>
                <span class="hdr-title">📊 Thống kê</span>
                <div class="hdr-action"></div>
            </div>
            <div class="date-display" id="dateDisplay">---</div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <!-- Card 1: Đang có mặt -->
            <div class="stat-card green">
                <div class="icon">👥</div>
                <div class="value" id="insideCount">0</div>
                <div class="label">Đang có mặt</div>
                <div class="sub">trong thư viện</div>
            </div>

            <!-- Card 2: Lượt hôm nay -->
            <div class="stat-card blue">
                <div class="icon">📈</div>
                <div class="value" id="todayVisits">0</div>
                <div class="label">Lượt hôm nay</div>
                <div class="sub">tổng ra/vào</div>
            </div>

            <!-- Card 3: Thời gian TB -->
            <div class="stat-card orange">
                <div class="icon">⏱️</div>
                <div class="value" id="avgDuration">0</div>
                <div class="label">Thời gian TB</div>
                <div class="sub">mỗi lượt (phút)</div>
            </div>

            <!-- Card 4: Tổng thành viên -->
            <div class="stat-card purple">
                <div class="icon">👤</div>
                <div class="value" id="totalUsers">0</div>
                <div class="label">Thành viên</div>
                <div class="sub" id="userBreakdown">0 SV / 0 Admin</div>
            </div>
        </div>

        <!-- Đang có mặt chi tiết -->
        <div class="section">
            <div class="section-title">👥 Danh sách đang có mặt</div>
            <div class="inside-list" id="insideList">
                <div class="empty-state">Đang tải...</div>
            </div>
        </div>

        <!-- Người sử dụng lâu nhất -->
        <div class="section">
            <div class="section-title">🏆 Người sử dụng lâu nhất hôm nay</div>
            <div class="longest-card" id="longestCard">
                <div class="empty-state">Đang tải...</div>
            </div>
        </div>

        <!-- Bottom nav -->
        <div class="bottom-nav">
            <a href="admin-scan.html">
                <span class="icon">📷</span>
                Quét mã
            </a>
            <a href="admin-users.html">
                <span class="icon">👥</span>
                Thành viên
            </a>
            <a href="admin-stats.html" class="active">
                <span class="icon">📊</span>
                Thống kê
            </a>
            <a href="history.html">
                <span class="icon">📋</span>
                Lịch sử
            </a>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script>
        // ===== KIỂM TRA QUYỀN ADMIN =====
        (function() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                alert('Bạn không có quyền truy cập!');
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userData);
            if (user.role !== 'admin') {
                alert('Bạn không có quyền truy cập trang này!');
                window.location.href = 'dashboard.html';
                return;
            }
        })();

        /**
         * Format thời gian
         */
        function formatTime(timestamp) {
            if (!timestamp) return '---';
            const d = new Date(timestamp.replace(' ', 'T'));
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        /**
         * Format ngày
         */
        function formatDate(date) {
            const d = new Date(date);
            const days = ['Chủ nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            return `${days[d.getDay()]}, ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }

        /**
         * Tải thống kê từ API
         */
        async function loadStats() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            const currentUser = JSON.parse(userData);

            try {
                const result = await apiGet('/admin/stats', { user_id: currentUser.id });
                const stats = result.data;

                // Hiển thị ngày
                document.getElementById('dateDisplay').textContent = formatDate(new Date());

                // Card 1: Đang có mặt
                document.getElementById('insideCount').textContent = stats.currently_inside.count;
                renderInsideList(stats.currently_inside.users);

                // Card 2: Lượt hôm nay
                document.getElementById('todayVisits').textContent = stats.today.total_visits;

                // Card 3: Thời gian TB
                document.getElementById('avgDuration').textContent = stats.average_duration.average;
                document.getElementById('avgDuration').nextElementSibling.textContent = 
                    `mỗi lượt (${stats.average_duration.sessions} lượt)`;

                // Card 4: Tổng thành viên
                document.getElementById('totalUsers').textContent = stats.users.total;
                document.getElementById('userBreakdown').textContent = 
                    `${stats.users.students} SV / ${stats.users.admins} Admin`;

                // Người sử dụng lâu nhất
                renderLongestSession(stats.longest_session);

            } catch (err) {
                console.error('Lỗi tải thống kê:', err);
                document.querySelector('.stats-grid').innerHTML = `
                    <div class="stat-card full-width" style="grid-column: 1/-1;">
                        <div class="icon">⚠️</div>
                        <div class="label">Không thể tải dữ liệu</div>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 12px;">
                            🔄 Thử lại
                        </button>
                    </div>
                `;
            }
        }

        /**
         * Render danh sách đang có mặt
         */
        function renderInsideList(users) {
            const container = document.getElementById('insideList');
            
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state">Không có ai trong thư viện</div>';
                return;
            }

            container.innerHTML = users.map(user => `
                <div class="inside-item">
                    <div class="info">
                        <div class="name">${user.name}</div>
                        <div class="meta">${user.library_code} • ${user.class_name || 'N/A'}</div>
                    </div>
                    <div class="time">${formatTime(user.entry_time)}</div>
                </div>
            `).join('');
        }

        /**
         * Render người sử dụng lâu nhất
         */
        function renderLongestSession(session) {
            const container = document.getElementById('longestCard');
            
            if (!session) {
                container.innerHTML = '<div class="empty-state">Chưa có dữ liệu hôm nay</div>';
                return;
            }

            const hours = Math.floor(session.duration_minutes / 60);
            const mins = session.duration_minutes % 60;
            const durationText = hours > 0 ? `${hours}h ${mins}m` : `${mins} phút`;

            container.innerHTML = `
                <div class="user-info">
                    <div class="avatar">${session.name.charAt(0).toUpperCase()}</div>
                    <div class="user-details">
                        <div class="name">${session.name}</div>
                        <div class="class">${session.library_code} • ${session.class_name || 'N/A'}</div>
                    </div>
                </div>
                <div class="duration">
                    <div class="time">${durationText}</div>
                    <div class="label">Thời gian sử dụng</div>
                </div>
            `;
        }

        // Tự động tải lại sau 30 giây
        let refreshInterval;

        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                loadStats();
            }, 30000);
        }

        // Load khi trang sẵn sàng
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            startAutoRefresh();
        });

        // Dừng refresh khi rời trang
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
