<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Quét QR - Thư viện VTS</title>
    <!-- Thư viện quét QR bằng camera -->
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* --- Tối ưu riêng cho trang Admin Scan --- */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-page {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: #f8f9fc;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .hdr {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 20px 24px;
            text-align: center;
        }

        .hdr .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hdr .top-row .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .hdr .top-row .hdr-title {
            font-size: 16px;
            font-weight: 600;
        }

        .hdr .top-row .hdr-action {
            width: 36px;
        }

        .hdr .device-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 12px;
            font-weight: 500;
        }

        /* --- Camera area --- */
        .camera-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        /* Khung camera */
        #reader {
            width: 100% !important;
            max-width: 360px !important;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        #reader video {
            border-radius: 16px 16px 0 0 !important;
        }

        /* Dòng hướng dẫn */
        .camera-hint {
            text-align: center;
            padding: 16px 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .camera-hint .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
        }

        /* --- Scan result overlay --- */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.15s ease;
        }

        .result-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-card {
            background: white;
            border-radius: 24px;
            padding: 36px 28px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: popIn 0.25s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .result-card .icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 12px;
        }

        .result-card .icon.success {
            background: #d1fae5;
            color: #10b981;
        }

        .result-card .icon.error {
            background: #fee2e2;
            color: #ef4444;
        }

        .result-card .status-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .result-card .status-sub {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .result-card .status-code {
            font-size: 13px;
            color: #9ca3af;
        }

        .result-card .countdown {
            font-size: 12px;
            color: #d1d5db;
            margin-top: 16px;
        }

        /* --- Nút bật/tắt camera thủ công --- */
        .btn-camera {
            width: 100%;
            padding: 14px;
            border: 2px dashed #d1d5db;
            border-radius: 14px;
            background: white;
            color: #6b7280;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-camera:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-camera .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        /* --- Bottom nav --- */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #f3f4f6;
            background: white;
            padding: 8px 0;
            position: sticky;
            bottom: 0;
        }

        .bottom-nav a {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            text-decoration: none;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .bottom-nav a.active {
            color: #667eea;
        }

        .bottom-nav a .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }

        @media (min-width: 421px) {
            .admin-page {
                border-radius: 24px;
                min-height: auto;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                margin: 20px;
            }

            .result-overlay {
                position: absolute;
                border-radius: 24px;
            }
        }

        @media (max-width: 380px) {
            #reader {
                max-width: 300px !important;
            }
        }

        /* Tùy chỉnh style của html5-qrcode */
        #reader__dashboard_section {
            padding: 0 !important;
        }

        #reader__dashboard_section_csr button {
            background: #667eea !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 10px !important;
            font-size: 14px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            margin: 8px 0 !important;
        }

        #reader__dashboard_section_csr button:hover {
            opacity: 0.9 !important;
        }

        #reader__dashboard_section_swlink {
            text-align: center !important;
            padding: 8px !important;
            font-size: 13px !important;
        }

        #reader__dashboard_section_swlink a {
            color: #667eea !important;
        }

        #reader__scan_region {
            min-height: 240px !important;
            background: #f3f4f6 !important;
        }

        #reader__scan_region img {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="admin-page">
        <!-- Header -->
        <div class="hdr">
            <div class="top-row">
                <a href="../index.html" class="back-btn">←</a>
                <span class="hdr-title">📷 Admin Quét QR</span>
                <div class="hdr-action"></div>
            </div>
            <div class="device-badge">📱 Thiết bị: ADMIN_PHONE</div>
        </div>

        <!-- Camera Section -->
        <div class="camera-section">
            <div id="reader"></div>

            <div class="camera-hint" id="cameraHint">
                <span class="icon">📸</span>
                Đưa mã QR vào khung hình để quét tự động
            </div>

            <div style="padding: 0 16px; width: 100%;">
                <button class="btn-camera" id="btnStartCamera" onclick="startCamera()">
                    <span class="icon">📷</span>
                    Bật camera
                </button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="admin-scan.html" class="active">
                <span class="icon">📷</span>
                Quét mã
            </a>
            <a href="admin-users.html">
                <span class="icon">👥</span>
                Thành viên
            </a>
            <a href="admin-stats.html">
                <span class="icon">📊</span>
                Thống kê
            </a>
            <a href="history.html">
                <span class="icon">📋</span>
                Lịch sử
            </a>
        </div>
    </div>

    <!-- Overlay kết quả -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card" id="resultCard">
            <div class="icon" id="resultIcon">✅</div>
            <div class="status-title" id="resultTitle">---</div>
            <div class="status-sub" id="resultSub">---</div>
            <div class="status-code" id="resultCode">---</div>
            <div class="countdown" id="countdown">Tự động quét tiếp sau 3 giây...</div>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script>
        // ===== KIỂM TRA QUYỀN ADMIN KHI VÀO TRANG =====
        (function checkAdminAccess() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                alert('Bạn không có quyền truy cập! Vui lòng đăng nhập bằng tài khoản Admin.');
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userData);
            if (user.role !== 'admin') {
                alert('Bạn không có quyền truy cập! Trang này chỉ dành cho Admin.');
                window.location.href = 'dashboard.html';
                return;
            }
        })();

        // --- Biến toàn cục ---
        let html5QrCode = null;
        let isScanning = false;
        let scanTimeout = null;
        let countdownInterval = null;

        const DEVICE_ID = 'ADMIN_PHONE';

        /**
         * Khởi tạo và bắt đầu camera
         */
        async function startCamera() {
            const btn = document.getElementById('btnStartCamera');
            const hint = document.getElementById('cameraHint');

            // Nếu đang chạy thì không làm gì
            if (isScanning) return;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="icon">⏳</span> Đang mở camera...';

                // Tạo instance html5-qrcode nếu chưa có
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }

                // Cấu hình camera
                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0
                };

                // Bắt đầu quét
                await html5QrCode.start(
                    { facingMode: "environment" }, // Camera sau
                    config,
                    onScanSuccess,  // Callback khi quét được QR
                    onScanFailure   // Callback khi không quét được
                );

                isScanning = true;
                btn.style.display = 'none';
                hint.innerHTML = '<span class="icon">🔍</span> Đang quét... Đưa mã QR vào khung hình';

            } catch (err) {
                console.error('Camera error:', err);
                btn.disabled = false;
                btn.innerHTML = '<span class="icon">❌</span> Không thể mở camera';

                let errorMsg = 'Không thể mở camera. ';
                if (err.message && err.message.includes('NotAllowedError')) {
                    errorMsg += 'Vui lòng cấp quyền truy cập camera.';
                } else if (err.message && err.message.includes('NotFoundError')) {
                    errorMsg += 'Không tìm thấy camera trên thiết bị.';
                } else {
                    errorMsg += err.message || 'Lỗi không xác định.';
                }

                hint.innerHTML = `<span class="icon">⚠️</span> ${errorMsg}`;

                // Sau 3 giây cho phép thử lại
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<span class="icon">📷</span> Thử lại';
                }, 3000);
            }
        }

        /**
         * Callback khi quét được QR thành công
         * @param {string} decodedText - Chuỗi mã QR (library_code)
         */
        async function onScanSuccess(decodedText) {
            const libraryCode = decodedText.trim().toUpperCase();
            console.log(`[QR Scan] Phát hiện mã: ${libraryCode}`);

            // Dừng camera tạm thời
            stopCamera();

            // Kiểm tra định dạng library_code (tùy chọn)
            // Gọi API scan
            try {
                const result = await apiPost('/access/scan', {
                    library_code: libraryCode,
                    device_id: DEVICE_ID
                });

                // Thành công
                showResult(true, {
                    title: '✅ Hợp lệ!',
                    sub: result.user_name,
                    code: `Mã thẻ: ${libraryCode}`
                });

            } catch (err) {
                // Thất bại
                showResult(false, {
                    title: '❌ Mã không hợp lệ!',
                    sub: err.message || 'Không tìm thấy người dùng với mã này',
                    code: `Mã: ${libraryCode}`
                });
            }

            // Tự động reset sau 3 giây
            startCountdown(3);
        }

        /**
         * Callback khi camera đang quét nhưng chưa thấy QR
         */
        function onScanFailure(err) {
            // Không cần xử lý, chỉ log để debug
            // console.warn('Scan failure:', err);
        }

        /**
         * Dừng camera
         */
        function stopCamera() {
            if (html5QrCode && isScanning) {
                try {
                    html5QrCode.stop();
                } catch (e) {
                    console.warn('Stop camera error:', e);
                }
                isScanning = false;
            }
        }

        /**
         * Hiển thị overlay kết quả
         * @param {boolean} success - Thành công hay thất bại
         * @param {object} data - { title, sub, code }
         */
        function showResult(success, data) {
            const overlay = document.getElementById('resultOverlay');
            const card = document.getElementById('resultCard');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const sub = document.getElementById('resultSub');
            const code = document.getElementById('resultCode');

            icon.className = `icon ${success ? 'success' : 'error'}`;
            icon.textContent = success ? '✅' : '❌';
            title.textContent = data.title;
            sub.textContent = data.sub;
            code.textContent = data.code;

            // Màu sắc
            title.style.color = success ? '#065f46' : '#991b1b';

            overlay.classList.add('show');
        }

        /**
         * Ẩn overlay
         */
        function hideResult() {
            document.getElementById('resultOverlay').classList.remove('show');
        }

        /**
         * Đếm ngược rồi tự động mở lại camera
         * @param {number} seconds 
         */
        function startCountdown(seconds) {
            const countdownEl = document.getElementById('countdown');
            let remaining = seconds;

            if (countdownInterval) clearInterval(countdownInterval);

            countdownEl.textContent = `Tự động quét tiếp sau ${remaining} giây...`;

            countdownInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    // Ẩn kết quả, mở lại camera
                    hideResult();
                    startCamera();
                } else {
                    countdownEl.textContent = `Tự động quét tiếp sau ${remaining} giây...`;
                }
            }, 1000);
        }

        /**
         * Dọn dẹp khi rời trang
         */
        window.addEventListener('beforeunload', () => {
            stopCamera();
            if (countdownInterval) clearInterval(countdownInterval);
            if (scanTimeout) clearTimeout(scanTimeout);
        });

        // Tự động hỏi mở camera khi trang load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => startCamera(), 500);
        });
    </script>
</body>
</html>
